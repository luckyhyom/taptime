  shared_preferences: ^2.5.3
  sign_in_with_apple: ^6.1.4
  supabase_flutter: ^2.9.0
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.32.0
  flutter_test:
