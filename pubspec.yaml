name: taptime
description: "Taptime - preset-based Pomodoro timer app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  connectivity_plus: ^6.1.4
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_riverpod: ^2.6.1
  geolocator: ^14.0.2
  go_router: ^14.8.1
  google_sign_in: ^6.3.0
